<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LNWAY AR Viewer</title>

  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
  </script>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background-color: #f5f5f5;
    }

    #ar-button {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      padding: 14px 24px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<model-viewer
  src="LNWAY.glb"
  ios-src="LNWAY.usdz"

  ar
  ar-modes="webxr scene-viewer quick-look"

  camera-controls
  touch-action="pan-y"

  scale="1000 1000 1000"

  camera-orbit="0deg 75deg 1m"
  min-camera-orbit="auto auto 0.5m"
  max-camera-orbit="auto auto 10m"

  shadow-intensity="1"
  exposure="1"
  auto-rotate>

  <button slot="ar-button" id="ar-button">
    View Sign in AR
  </button>

</model-viewer>

</body>
</html>
