<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LNWAY AR Viewer</title>

  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
  </script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5f5f5;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background-color: #f5f5f5;
    }

    #ar-button {
      background-color: white;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 24px;
      padding: 12px 24px;
      border-radius: 24px;
      border: 1px solid #DADCE0;
      font-size: 16px;
      cursor: pointer;
    }

    #ar-button:active {
      background-color: #E8EAED;
    }

    model-viewer > #ar-prompt {
      position: absolute;
      left: 50%;
      bottom: 90px;
      transform: translateX(-50%);
      display: none;
      font-size: 14px;
      background: rgba(255,255,255,0.9);
      padding: 8px 12px;
      border-radius: 6px;
    }

    model-viewer[ar-status="session-started"] > #ar-prompt {
      display: block;
    }

    model-viewer > #ar-failure {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 90px;
      display: none;
      background: #fff;
      padding: 8px 12px;
      border-radius: 6px;
    }

    model-viewer[ar-tracking="not-tracking"] > #ar-failure {
      display: block;
    }
  </style>
</head>

<body>

<model-viewer
  src="LNWAY.glb"
  ios-src="LNWAY.usdz"
  alt="LNWAY Sign"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  touch-action="pan-y"
  shadow-intensity="1"
  exposure="1">

  <button slot="ar-button" id="ar-button">
    View Sign in AR
  </button>

  <div id="ar-prompt">
    Move phone slowly to detect a surface
  </div>

  <div id="ar-failure">
    AR tracking lost
  </div>

</model-viewer>

</body>
</html>
